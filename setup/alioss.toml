[package]
name = "alioss"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "ao"

[dependencies]
chrono = "0.4"
clap = { version = "4", features = ["derive"] }
hex = "0.4"
hmac = "0.13"
reqwest = "0.13"
serde = { version = "1", features = ["derive"] }
serde_yml = "0.0.12"
sha2 = "0.11"
tokio = { version = "1", features = ["full"] }
url = "2"
xml-rs = "1"
anyhow = "1"
