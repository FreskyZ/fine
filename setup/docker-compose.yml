name: fine

services:
  # docker compose up -d acme
  # or run shell: docker compose run --rm --name acme-shell1 --entrypoint sh acme
  #   # docker compose run does not respect container_name if you ask
  #   - initial setup: /create.py
  #   - or restore backup: tar xJf letsencrypt-backup.tar.xz -C /
  #   - update certificate domains or other certbot commands: certbot certonly ...
  #   - check renew schedule: cat /etc/letsencrypt/renewal-schedule/next
  acme:
    image: my/certbot:1
    container_name: acme1
    environment:
      # make absolute paths more centralized
      FINE_CONFIG_DIR: /etc/fine
      FINE_SOCKET_DIR: /run/fine
    volumes:
      - certificates:/etc/letsencrypt
      # why do you need to map this?
      - certbot-libs:/var/lib/letsencrypt
      - certbot-logs:/var/log/letsencrypt
      # socket dir can work with ro
      - fine-sockets:/run/fine:ro
      - type: volume
        source: fine-configs
        target: /etc/fine/certbot.yml
        volume: { subpath: certbot.yml }
        read_only: true
      - type: volume
        source: fine-configs
        target: /etc/fine/domains.yml
        volume: { subpath: domains.yml }
        read_only: true

  # docker compose up -d database
  # or run shell: docker compose run --rm --name database-shell1 --entrypoint sh database
  #   - initial setup: ./initdb.sh
  # or directly psql: docker compose run --rm --name database-shell1 --entrypoint psql database
  database:
    image: my/postgres:1
    container_name: database1
    stop_grace_period: 5m # why can't I write 5min for 5 minutes
    volumes:
      - database:/var/lib/pgsql
      - database-logs:/var/lib/pgsql/logs
      - database-sockets:/run/pgsql

  # docker compose run --rm --name akari1 -v .:/self -p 8001:8001 akari
  #   # docker compose run does not respect port, if you ask
  #   # port and container_name is skipped in run because they may be conflict with existing up'd containers
  # or run shell: docker compose run --rm --name akari2 -v .:/self --entrypoint sh akari
  akari:
    image: node
    working_dir: /var/fine
    entrypoint: node akari.ts
    environment:
      # inline host in ps1 so that you don't need to specify host
      PS1: '[@AKARI-SHELL:\w]\n\$ '
      # make absolute paths more centralized
      FINE_CONFIG_DIR: /etc/fine
    # the volume list is same as main service, but most of them are not readonly
    volumes:
      - fine-program:/var/fine
      - node_modules:/var/fine/node_modules
      - fine-sockets:/run/fine
      - fine-logs:/var/log/fine
      - certificates:/etc/letsencrypt:ro
      - fine-public:/var/fine/public
      - database-logs:/var/lib/pgsql/logs:ro
      - certbot-logs:/var/log/letsencrypt
      - fine-configs:/etc/fine

  # docker compose up -d web
  # restart: docker compose restart web
  web:
    image: node
    container_name: fine1
    working_dir: /var/fine
    entrypoint: node index.js
    environment:
      # make absolute paths more centralized
      FINE_CONFIG_DIR: /etc/fine
    ports:
      - 80:80
      - 443:443
    volumes:
      - fine-program:/var/fine:ro
      # TODO does this work
      - node_modules:/var/fine/node_modules:ro
      - fine-sockets:/run/fine
      - database-sockets:/run/pgsql:ro
      - fine-logs:/var/log/fine
      - certificates:/etc/letsencrypt:ro
      - fine-public:/var/fine/public:ro
      - type: volume
        source: fine-configs
        target: /etc/fine/config.json
        volume: { subpath: config.json }
        read_only: true
      - type: volume
        source: fine-configs
        target: /etc/fine/domains.yml
        volume: { subpath: domains.yml }
        read_only: true
      # NOTE in process servers need their config files manually add here TODO is this good?
      - type: volume
        source: fine-configs
        target: /etc/fine/short-link.yml
        volume: { subpath: short-link.yml }
        read_only: true
    # main program does not depend on database running (serve static contents)
    # main program does not depend on certificate renewer running (only depend on file exists)

  # TODO
  backup:
    image: node
    container_name: backup1
    volumes:
      - certificates:/data/certificates:ro
      - fine-configs:/data/configs:ro
      - fine-program:/data/program:ro
      - certbot-logs:/logs/certbot:ro
      - database-logs:/logs/database:ro
      - fine-logs:/logs/fine:ro
      - database-sockets:/run/pgsql:ro

volumes:
  database:
    name: fine-database
  database-logs:
    name: fine-database-logs
  database-sockets:
    name: fine-database-sockets
  certificates:
    name: certificates
  certbot-libs: # why do certbot/certbot want me to map /var/lib/letsencrypt?
    name: certbot-libs
  certbot-logs:
    name: certbot-logs
  fine-configs:
    name: fine-configs
  fine-sockets: # this is only for sockets, but you cannot share tmpfs accross containers
    name: fine-sockets
  fine-logs:
    name: fine-logs
  fine-program:
    name: fine-program
  fine-public: # should be easier to mount and manipulate
    name: fine-public
  node_modules:
    name: fine-node_modules
